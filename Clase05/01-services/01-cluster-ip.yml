apiVersion: apps/v1
kind: Deployment
metadata:
  name: rs-nginx
spec:
  replicas: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      env: dev
      app: backend
  template:
    metadata:
      labels:
        env: dev
        app: backend
    spec:
      containers:
        - name: app-python
          image: python:3.7-alpine
          command:
            [
              "sh",
              "-c",
              "echo 'Página Python' > index.html && python -m http.server 9080",
            ]
---
apiVersion: v1
kind: Service
metadata:
  name: svc-web
spec:
  type: ClusterIP
  selector:
    env: dev
    app: backend
  ports:
    - port: 4500
      targetPort: 9080
      protocol: TCP
      name: port-backend
