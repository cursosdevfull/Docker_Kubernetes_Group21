apiVersion: v1
kind: Namespace
metadata:
  name: ns-dev
  labels:
    app: frontend
    env: dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rs-nginx-dev
  namespace: ns-dev
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      env: dev
      app: frontend
  template:
    metadata:
      labels:
        env: dev
        app: frontend
    spec:
      containers:
        - name: app-python
          image: python:3.7-alpine
          command:
            [
              "sh",
              "-c",
              "echo 'Pagina Python' > index.html && python -m http.server 9080",
            ]
---
apiVersion: v1
kind: Namespace
metadata:
  name: ns-prd
  labels:
    app: frontend
    env: prd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rs-nginx-prd
  namespace: ns-prd
spec:
  replicas: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      env: prd
      app: frontend
  template:
    metadata:
      labels:
        env: prd
        app: frontend
    spec:
      containers:
        - name: app-python
          image: python:3.7-alpine
          command:
            [
              "sh",
              "-c",
              "echo 'Pagina Python' > index.html && python -m http.server 9080",
            ]
